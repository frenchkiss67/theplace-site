<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>THEPLACE - Demoscene Intro</title>
<style>
*{margin:0;overflow:hidden}
body{background:#000}
canvas{width:100vw;height:100vh;image-rendering:pixelated}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),W=320,H=200;
c.width=W;c.height=H;
const x=c.getContext('2d'),img=x.createImageData(W,H),d=img.data;
const S=new Float32Array(1024);
for(let i=0;i<1024;i++)S[i]=Math.sin(i*Math.PI*2/1024);
const sin=v=>S[((v%1024)+1024)%1024|0];

let t=0;
function render(){
  t+=0.6;
  for(let j=0;j<H;j++){
    for(let i=0;i<W;i++){
      const p=(j*W+i)*4;
      const cx=i-W/2,cy=j-H/2;
      const dist=Math.sqrt(cx*cx+cy*cy);
      const v1=sin(i*2.5+t*1.3);
      const v2=sin(j*3.1+t*0.9);
      const v3=sin((i+j)*1.7+t*1.1);
      const v4=sin(dist*2.8-t*1.5);
      const v5=sin(i*1.2-j*0.8+t*0.7);
      const val=(v1+v2+v3+v4+v5)*0.2;
      const r=sin((val*300)+t*2)*127+128;
      const g=sin((val*300)+t*2+341)*127+128;
      const b=sin((val*300)+t*2+682)*127+128;
      d[p]=r;d[p+1]=g;d[p+2]=b;d[p+3]=255;
    }
  }
  x.putImageData(img,0,0);

  // Scrolling text overlay
  x.save();
  x.globalAlpha=0.85;
  x.font='bold 36px monospace';
  x.textAlign='center';
  x.textBaseline='middle';
  x.shadowColor='#fff';
  x.shadowBlur=20;
  x.fillStyle='#fff';
  x.fillText('THEPLACE',W/2,H/2-10);
  x.shadowBlur=0;
  x.font='10px monospace';
  x.globalAlpha=0.5+sin(t*8|0)*0.3;
  x.fillText('a demoscene intro',W/2,H/2+16);
  x.restore();

  // Scanlines
  x.save();
  x.fillStyle='rgba(0,0,0,0.15)';
  for(let y=0;y<H;y+=2)x.fillRect(0,y,W,1);
  x.restore();

  requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
